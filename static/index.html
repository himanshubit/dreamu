        /* --- CORE STYLES --- */
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            overflow-y: auto;
            background-color: #020617; /* Midnight Slate */
            color: #f1f5f9; /* High Contrast White/Slate */

        h1 { font-family: 'Space Grotesk', sans-serif; }

        /* --- 3D BACKGROUND CANVAS --- */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* --- MODERN PANELS --- */
        .modern-panel {
            background: rgba(15, 23, 42, 0.6); /* Slate-900 with transparency */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 2rem;
        }

        /* --- PILL PRESETS (Wider, Shorter, Transparent) --- */
        .preset-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border-radius: 9999px; /* Full Pill Shape */
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(30, 41, 59, 0.4); /* 60% Transparent Slate */
            backdrop-filter: blur(4px);
        }
        
        .preset-card:hover {
            transform: translateY(-2px) scale(1.02);
            border-color: rgba(167, 139, 250, 0.8); /* Violet-400 */
            background: rgba(139, 92, 246, 0.2);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
        }

        .preset-card.active {
            border-color: #a855f7; /* Purple-500 */
            background: rgba(168, 85, 247, 0.25);
            box-shadow: 0 0 0 1px rgba(168, 85, 247, 0.5), inset 0 0 10px rgba(168, 85, 247, 0.2);
        }
        
        .preset-img {
            mask-image: linear-gradient(to right, black 0%, transparent 90%);
            -webkit-mask-image: linear-gradient(to right, black 30%, transparent 100%);
        }

        /* --- SCROLLBAR --- */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: rgba(168, 85, 247, 0.5); }

        /* --- GRADIENT BUTTON ANIMATION --- */
        .btn-gradient {
            background-size: 200% 200%;
            animation: gradient-move 3s ease infinite;
        }
        @keyframes gradient-move {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- ANIMATED LOADER --- */
        .loader-ring div {
            border: 2px solid #c084fc;
            border-color: #c084fc transparent transparent transparent;
        }

        /* Glass Input Field */
        .glass-input {
            background: rgba(30, 41, 59, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f8fafc;
            transition: all 0.2s;
            border-radius: 9999px;
        }
        .glass-input:hover {
            background: rgba(30, 41, 59, 0.5);
            border-color: rgba(192, 132, 252, 0.5);
        }
    </style>

    <script>
        /* --- 3D BACKGROUND (RANDOM + DRIFT + DENSITY 0.75) --- */
        const init3DBackground = () => {
            const canvas = document.getElementById('bg-canvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 6, 0);
            camera.lookAt(0, 0, 0);

            const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const particlesGeometry = new THREE.BufferGeometry();
            const particlesCount = 12000; 
            const posArray = new Float32Array(particlesCount * 3);
            const initialPositions = new Float32Array(particlesCount * 3);
            const randomSpeeds = new Float32Array(particlesCount);

            for(let i = 0; i < particlesCount; i++) {
                const i3 = i * 3;
                posArray[i3] = (Math.random() - 0.5) * 35;     
                posArray[i3 + 1] = (Math.random() - 0.5) * 4;  
                posArray[i3 + 2] = (Math.random() - 0.5) * 15; 
                initialPositions[i3] = posArray[i3]; initialPositions[i3 + 1] = posArray[i3 + 1]; initialPositions[i3 + 2] = posArray[i3 + 2];
                randomSpeeds[i] = Math.random() * 0.5 + 0.5;
            }

            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

            const material = new THREE.PointsMaterial({
                size: 0.02,
                color: 0x94a3b8, // Slate-400 for soft white/grey
                transparent: true,
                opacity: 0.75, 
                sizeAttenuation: true
            });

            const particlesMesh = new THREE.Points(particlesGeometry, material);
            scene.add(particlesMesh);

            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

            document.addEventListener('mousemove', (event) => {
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            });

            const clock = new THREE.Clock();

            const animate = () => {
                const elapsedTime = clock.getElapsedTime();
                raycaster.setFromCamera(mouse, camera);
                const intersects = new THREE.Vector3();
                raycaster.ray.intersectPlane(plane, intersects);

                const positions = particlesGeometry.attributes.position.array;
                for(let i = 0; i < particlesCount; i++) {
                    const i3 = i * 3;
                    const speed = randomSpeeds[i];
                    let y = Math.sin(elapsedTime * 0.3 * speed + initialPositions[i3] * 0.5) * 0.3 + Math.cos(elapsedTime * 0.2 * speed + initialPositions[i3+2] * 0.5) * 0.3;
                    const driftX = Math.sin(elapsedTime * 0.1 * speed + i) * 0.2;
                    const driftZ = Math.cos(elapsedTime * 0.15 * speed + i) * 0.2;
                    positions[i3] = initialPositions[i3] + driftX;
                    positions[i3 + 2] = initialPositions[i3 + 2] + driftZ;

                    if (intersects) {
                        const dx = positions[i3] - intersects.x;
                        const dz = positions[i3 + 2] - intersects.z;
                        const dist = Math.sqrt(dx*dx + dz*dz);
                        if(dist < 2.5) { y -= Math.max(0, 2.5 - dist) * 0.15; }
                    }
                    positions[i3 + 1] = initialPositions[i3+1] + y;
                }
                particlesGeometry.attributes.position.needsUpdate = true;
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            };
            animate();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        };
        init3DBackground();

        let selectedStyle = 'trend_flux';

        function selectStyle(style, element) {
            selectedStyle = style;
            document.querySelectorAll('.preset-card').forEach(card => card.classList.remove('active'));
            element.classList.add('active');
        }

        async function dream() {
            const fileInput = document.getElementById('fileInput');
            if(fileInput.files.length === 0) return alert("Please upload source material first.");

            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('resultImg').classList.add('hidden');
            document.getElementById('downloadLink').classList.add('hidden');
            document.getElementById('storyPanel').classList.add('hidden', 'translate-y-full');
            const btn = document.getElementById('dreamBtn');
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-pulse tracking-widest">DREAMING...</span>`;
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('style', selectedStyle);

            try {
                const response = await fetch('/api/dream', { method: 'POST', body: formData });
                const data = await response.json();

                if(data.status === 'success') {
                    const img = document.getElementById('resultImg');
                    const dlLink = document.getElementById('downloadLink');
                    
                    img.src = data.dream_url + "?t=" + new Date().getTime();
                    dlLink.href = data.dream_url;
                    dlLink.download = `dreamu_${new Date().getTime()}.png`;
                    
                    if(data.title) {
                        document.getElementById('dreamTitle').innerText = data.title;
                        document.getElementById('dreamStory').innerText = data.story;
                    }

                    img.onload = () => {
                        document.getElementById('loader').classList.add('hidden');
                        img.classList.remove('hidden');
                        dlLink.classList.remove('hidden');
                        img.style.opacity = 0;
                        setTimeout(() => img.style.opacity = 1, 50);
                        
                        const storyPanel = document.getElementById('storyPanel');
                        storyPanel.classList.remove('hidden');
                        setTimeout(() => storyPanel.classList.remove('translate-y-full'), 100);
                        setTimeout(() => storyPanel.classList.remove('translate-y-10'), 100);
                    };
                } else {
                    alert('Dream failed: ' + data.error);
                    resetUI();
                }
            } catch (err) {
                console.error(err);
                alert("Connection corrupted. Check console.");
                resetUI();
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.innerHTML = `<span>Initialize Dream</span><svg class="w-5 h-5 text-white/80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>`;
            }
        }

        function resetUI() {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('placeholder').classList.remove('hidden');
            document.getElementById('downloadLink').classList.add('hidden');
        }
    </script>
</body>
</html>
