<html lang="en">
<head>

    <style>
        /* --- CORE STYLES (Light Black / Grey Theme) --- */
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-color: #334044; /* Light Black */
            color: #e5e7eb; /* Light Grey Text */
        }

        h1 { font-family: 'Space Grotesk', sans-serif; }

        /* --- 3D BACKGROUND CANVAS --- */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* --- MODERN PANELS (Dark Grey Glass) --- */
        .modern-panel {
            background: rgba(23, 23, 23, 0.6); /* Dark Grey transparent */
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 2rem;
        }

        /* --- PRESET CARDS --- */
        .preset-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border-radius: 1rem; /* Slightly tighter radius for shorter cards */
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(40, 40, 40, 0.4);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }
        
        .preset-card:hover {
            transform: translateY(-2px);
            border-color: rgba(168, 85, 247, 0.5);
            background: rgba(50, 50, 50, 0.6);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.4);
        }

        .preset-card.active {
            border-color: #a855f7; /* Purple-500 */
            background: rgba(168, 85, 247, 0.15);
            box-shadow: 0 0 0 1px rgba(168, 85, 247, 0.5);
        }

        /* --- SCROLLBAR --- */
        .custom-scroll::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(168, 85, 247, 0.5);
        }

        /* --- ANIMATED LOADER --- */
        .loader-ring {
            display: inline-block;
            position: relative;
            width: 64px;
            height: 64px;
        }
        .loader-ring div {
            box-sizing: border-box;
            display: block;
            position: absolute;
            width: 50px;
            height: 50px;
            margin: 8px;
            border: 3px solid #a855f7;
            border-radius: 50%;
            animation: loader-ring 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            border-color: #a855f7 transparent transparent transparent;
        }
        .loader-ring div:nth-child(1) { animation-delay: -0.45s; }
        .loader-ring div:nth-child(2) { animation-delay: -0.3s; }
        .loader-ring div:nth-child(3) { animation-delay: -0.15s; }
        @keyframes loader-ring {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Glass Input Field */
        .glass-input {
            background: rgba(30, 30, 30, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e5e7eb;
            transition: all 0.2s;
        }
        .glass-input:hover {
            background: rgba(40, 40, 40, 0.7);
            border-color: rgba(168, 85, 247, 0.4);
        }
    </style>
</head>

    <script>
        /* --- 3D BACKGROUND (RANDOM + DRIFT + DENSITY 0.75) --- */
        const init3DBackground = () => {
            const canvas = document.getElementById('bg-canvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 6, 0);
            camera.lookAt(0, 0, 0);

            const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const particlesGeometry = new THREE.BufferGeometry();
            const particlesCount = 12000; 
            const posArray = new Float32Array(particlesCount * 3);
            const initialPositions = new Float32Array(particlesCount * 3);
            const randomSpeeds = new Float32Array(particlesCount);

            for(let i = 0; i < particlesCount; i++) {
                const i3 = i * 3;
                posArray[i3] = (Math.random() - 0.5) * 35;     
                posArray[i3 + 1] = (Math.random() - 0.5) * 4;  
                posArray[i3 + 2] = (Math.random() - 0.5) * 15; 

                initialPositions[i3] = posArray[i3];
                initialPositions[i3 + 1] = posArray[i3 + 1];
                initialPositions[i3 + 2] = posArray[i3 + 2];
                randomSpeeds[i] = Math.random() * 0.5 + 0.5;
            }

            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

            const material = new THREE.PointsMaterial({
                size: 0.02,
                color: 0xffffff,
                transparent: true,
                opacity: 0.75, 
                sizeAttenuation: true
            });

            const particlesMesh = new THREE.Points(particlesGeometry, material);
            scene.add(particlesMesh);

            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

            document.addEventListener('mousemove', (event) => {
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            });

            const clock = new THREE.Clock();

            const animate = () => {
                const elapsedTime = clock.getElapsedTime();
                raycaster.setFromCamera(mouse, camera);
                const intersects = new THREE.Vector3();
                raycaster.ray.intersectPlane(plane, intersects);

                const positions = particlesGeometry.attributes.position.array;
                for(let i = 0; i < particlesCount; i++) {
                    const i3 = i * 3;
                    const speed = randomSpeeds[i];
                    let y = Math.sin(elapsedTime * 0.3 * speed + initialPositions[i3] * 0.5) * 0.3 + Math.cos(elapsedTime * 0.2 * speed + initialPositions[i3+2] * 0.5) * 0.3;
                    const driftX = Math.sin(elapsedTime * 0.1 * speed + i) * 0.2;
                    const driftZ = Math.cos(elapsedTime * 0.15 * speed + i) * 0.2;
                    positions[i3] = initialPositions[i3] + driftX;
                    positions[i3 + 2] = initialPositions[i3 + 2] + driftZ;

                    if (intersects) {
                        const dx = positions[i3] - intersects.x;
                        const dz = positions[i3 + 2] - intersects.z;
                        const dist = Math.sqrt(dx*dx + dz*dz);
                        if(dist < 2.5) { y -= Math.max(0, 2.5 - dist) * 0.15; }
                    }
                    positions[i3 + 1] = initialPositions[i3+1] + y;
                }
                particlesGeometry.attributes.position.needsUpdate = true;
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            };
            animate();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        };
        init3DBackground();

        /* --- LOGIC --- */
        let selectedStyle = 'real_raw'; 

        function selectStyle(style, element) {
            selectedStyle = style;
            document.querySelectorAll('.preset-card').forEach(card => card.classList.remove('active'));
            element.classList.add('active');
        }

        async function dream() {
            const fileInput = document.getElementById('fileInput');
            if(fileInput.files.length === 0) return alert("Please upload source material first.");

            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('resultImg').classList.add('hidden');
            document.getElementById('downloadLink').classList.add('hidden');
            document.getElementById('storyPanel').classList.add('hidden', 'translate-y-full');
            const btn = document.getElementById('dreamBtn');
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-pulse tracking-widest">DREAMING...</span>`;
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('style', selectedStyle);

            try {
                const response = await fetch('/api/dream', { method: 'POST', body: formData });
                const data = await response.json();

                if(data.status === 'success') {
                    const img = document.getElementById('resultImg');
                    const dlLink = document.getElementById('downloadLink');
                    
                    img.src = data.dream_url + "?t=" + new Date().getTime();
                    dlLink.href = data.dream_url;
                    dlLink.download = `dreamu_${new Date().getTime()}.png`;
                    
                    if(data.title) {
                        document.getElementById('dreamTitle').innerText = data.title;
                        document.getElementById('dreamStory').innerText = data.story;
                    }

                    img.onload = () => {
                        document.getElementById('loader').classList.add('hidden');
                        img.classList.remove('hidden');
                        dlLink.classList.remove('hidden');
                        img.style.opacity = 0;
                        setTimeout(() => img.style.opacity = 1, 50);
                        
                        const storyPanel = document.getElementById('storyPanel');
                        storyPanel.classList.remove('hidden');
                        setTimeout(() => storyPanel.classList.remove('translate-y-full'), 100);
                    };
                } else {
                    alert('Dream failed: ' + data.error);
                    resetUI();
                }
            } catch (err) {
                console.error(err);
                alert("Connection corrupted. Check console.");
                resetUI();
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.innerHTML = `<span>Initialize Dream</span><svg class="w-5 h-5 text-slate-400 group-hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>`;
            }
        }

        function resetUI() {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('placeholder').classList.remove('hidden');
            document.getElementById('downloadLink').classList.add('hidden');
        }
    </script>
</body>
</html>
